# Managed by SimpleLock. /simplelock updateconfig will update this when new defaults are merged.
config_version: 1.1

# Message display settings. Chat and command text now lives in lang.yml.
messages:
  # chat, action_bar, bossbar, none
  display_type: chat

# Debug logging is useful when testing protections or diagnosing admin reports.
logging:
  debug:
    protection_create: false
    access_denied: false
    bypass_use: false
    trust_changes: false
    ownership_transfers: false
    protection_cleanup: false
    hopper_denied: false
    explosions: false
    economy: false

# Optional Towny bypass integration.
towny:
  enabled: false
  mayor_bypass_open: false
  mayor_bypass_break: false
  nation_leader_bypass_open: false
  nation_leader_bypass_break: false

# Optional GriefPrevention bypass integration.
griefprevention:
  enabled: false
  container_trust_bypass_open: false
  build_trust_bypass_break: false

# Optional Lands bypass integration.
lands:
  enabled: false
  interact_container_bypass_open: false
  block_break_bypass_break: false

# Core protection behavior.
protection:
  hopper_protection:
    enabled: true
  explosion_protection:
    enabled: false

# Economy settings apply when Vault and an economy provider are available.
# If enabled, protect_cost is charged when a player creates a new protection sign.
economy:
  enabled: false
  # Base price charged to create a protection. Set to 0.0 to disable charges while keeping Vault hooked.
  protect_cost: 0.0
  # If true, owners get part of the current protect_cost back when removing their own protection.
  refund_on_unprotect: false
  # Percentage of protect_cost returned on unprotect. Clamped to 0-100.
  refund_percentage: 50.0

# GUI behavior settings. Main GUI titles are in lang.yml.
gui:
  enabled: true

# Version checks only affect notifications; they do not auto-download updates.
update_checker:
  enabled: true
  # If true, admins are reminded in-game when a newer version is available.
  announce_to_admins: true
